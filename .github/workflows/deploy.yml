name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Check out code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Log in to ACR using token
    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Build Docker image tagged with git commit SHA
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/nodeapp:${{ github.sha }} .

    # 4. Push image to ACR
    - name: Push image to ACR
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/nodeapp:${{ github.sha }}

    # 5. Set up kubectl using kubeconfig secret
    - name: Set up kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    # 6. Update deployment with new image
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/nodeapp-deployment \
          nodeapp=${{ secrets.ACR_NAME }}.azurecr.io/nodeapp:${{ github.sha }}

    # 7. Wait for rollout
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/nodeapp-deployment